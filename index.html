<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Voz Censurada</title>
    <link rel="stylesheet" href="dialoejem.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Press Start 2P', cursive; 
        }

        #contenedor-juego {
            position: relative; 
            width: 1000px;
            height: 550px;
            border: 2px solid #fff; 
        }

        canvas { 
            display: block; 
            image-rendering: pixelated; 
        }

        #menu-inicio {
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.7) 50%, rgba(0,0,0,0.3) 100%), 
                        url('fondo.gif');
            background-size: cover; 
            background-position: center; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: flex-start; 
            padding-left: 50px; z-index: 10; box-sizing: border-box;
        }

        h1 { color: white; font-size: 35px; text-shadow: 4px 4px #ff0000; margin-bottom: 40px; }

        .boton-menu {
            background: transparent; color: white; border: 2px solid white;
            padding: 15px; margin: 10px 0; font-size: 14px; 
            font-family: 'Press Start 2P', cursive; cursor: pointer; width: 300px;
            text-align: left; transition: 0.2s;
        }

        .boton-menu:hover { background: white; color: black; transform: translateX(10px); }

        #icono-mision {
            position: absolute;
            color: #ff0000;
            font-size: 60px; 
            font-weight: bold;
            text-shadow: 4px 4px 0px #fff; 
            z-index: 150;
            pointer-events: none;
            animation: flotar 0.8s infinite alternate ease-in-out;
        }

        @keyframes flotar {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        /* --- NUEVOS ESTILOS PANTALLA NEGRA Y VIDEO --- */
        #pantalla-negra {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 500; display: none;
        }

       #video-final {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999; /* Valor muy alto para estar sobre el canvas y menús */
    background: black;
    display: none;
    object-fit: cover; /* Para que llene toda la pantalla del contenedor */
}

        #pantalla-ajustes {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.7) 80%, rgba(0,0,0,0.7) 100%), 
                        url('fondo.gif');
            background-size: cover; 
            background-position: center; 
            display: flex; justify-content: center; align-items: center;
            z-index: 50;
        }

        .ajustes-box {
            width: 500px; height:200px ; background-color: #000; padding: 30px;
            border: 4px solid #fdfdfd; border-radius: 4px;
            box-shadow: inset 0 0 0 4px #4a4a4a; 
            position: relative;
        }

        .ajustes-box h2 { color: #ff0000; font-size: 16px; text-align: center; margin-bottom: 25px; }

        .opcion-ajuste {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; color: white; font-size: 10px;
        }

        .oculto { display: none !important; }

        .boton-volver-fuera {
            position: absolute; top: 30px; left: 30px; background: transparent;
            color: white; border: 3px solid white; font-size: 24px; cursor: pointer;
            padding: 10px; z-index: 60; transform: scaleX(-1); transition: 0.3s;
            line-height: 1;
        }

        .boton-volver-fuera:hover {
            background: white; color: black; transform: scaleX(-1) scale(1.1);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .retrato-contenedor {
            position: absolute; bottom: 140px; left: 470px; width: 120px; height: 120px;
            background: rgba(0, 0, 0, 0.8); border: 3px solid white;
            display: flex; justify-content: center; align-items: flex-start; z-index: 100;
        }

        .retrato-img { width: 100%; image-rendering: pixelated; }

        #capa-minijuego {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; background: #1a1a1a; border: 4px solid #00ff88;
            padding: 20px; z-index: 200; text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        #timer-mini { width: 100%; height: 10px; background: #333; margin: 15px 0; border: 1px solid #fff; }
        #bar-mini { width: 100%; height: 100%; background: #00ff88; transition: width 0.1s linear; }
        #tecla-display { font-size: 50px; color: #fff; margin: 10px 0; }
        #puntos-mini { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .punto { width: 12px; height: 12px; border-radius: 50%; background: #444; border: 1px solid #fff; }
        .punto.lleno { background: #00ff88; }
        #img-mini { width: 100%; height: 150px; object-fit: cover; border: 2px solid #fff; }

        #capa-unir-letras {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 210; background-color: #2c3e50; padding: 15px; border-radius: 10px;
            border: 4px solid #3498db; text-align: center;
        }
        #gameCanvas { background-color: #ecf0f1; border-radius: 10px; cursor: crosshair; }

        #interaccion-aviso {
            position: absolute; top: 30%; left: 50%; transform: translateX(-50%);
            color: white; z-index: 150;
        }

        #numero-victoria {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 150px; color: #00ff88; text-shadow: 5px 5px #000; z-index: 300;
            pointer-events: none; opacity: 0; transition: opacity 1s ease-in-out;
        }
        #numero-victoria.visible { opacity: 1; }

        #mensaje-objetivo {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            color: #000; font-size: 18px; text-align: center; z-index: 100;
            text-shadow: 2px 2px #ff0000; opacity: 0; transition: opacity 1s;
            pointer-events: none;
        }
        #mensaje-objetivo.visible { opacity: 1; }

    </style>
</head>

<body>

<div id="contenedor-juego">
    <div id="pantalla-negra"></div>
    <video id="video-final" src="video_final.mp4"></video> <div id="icono-mision" class="oculto">!</div>
    <div id="numero-victoria">7</div>
    <div id="mensaje-objetivo">OBJETIVO: OBTENER TODOS LOS NÚMEROS</div>

    <button id="btn-volver-juego" class="boton-volver-fuera oculto" onclick="volverAlMenu()">&#10140;</button>

    <div id="menu-inicio">
        <h1>VOZ CENSURADA</h1>
        <button class="boton-menu" onclick="comenzarJuego()">INICIAR PARTIDA</button>
        <button class="boton-menu" onclick="abrirAjustes()">AJUSTES</button>
    </div>

    <div id="capa-minijuego" class="oculto">
        <div id="mini-status" style="font-size: 10px; color: #00ff88;">ESTABLECIENDO CONEXIÓN...</div>
        <div id="timer-mini"><div id="bar-mini"></div></div>
        <div id="puntos-mini">
            <div class="punto"></div><div class="punto"></div><div class="punto"></div><div class="punto"></div><div class="punto"></div>
        </div>
        <div id="tecla-display">?</div>
        <img id="img-mini" src="limonada1.png" class="oculto">
        <div id="mini-progreso" style="font-size: 8px; margin-top: 10px;">PROGRESO: <span id="img-count">0</span>/3</div>
    </div>

    <div id="capa-unir-letras" class="oculto">
        <h2 style="color:white; font-size: 12px; margin-bottom: 10px;">UNE LOS PARES SIN CRUZAR LÍNEAS</h2>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>

    <div id="pantalla-ajustes" class="oculto">
        <button class="boton-volver-fuera" onclick="cerrarAjustes()">&#10140;</button>
        <div class="ajustes-box">
            <h2>AJUSTES DE SISTEMA</h2>
            <div class="opcion-ajuste">
                <span>VOLUMEN</span>
                <input type="range" id="slider-volumen" min="0" max="100" value="50" oninput="ajustarVolumen()">
            </div>
            <div class="opcion-ajuste">
                <span>BRILLO</span>
                <input type="range" id="rango-brillo" min="50" max="150" value="100" oninput="ajustarBrillo()">
            </div>
            <div class="opcion-ajuste">
                <span>PANTALLA COMPLETA</span>
                <button id="btnFullscreen" onclick="toggleFullscreen()" style="font-family:'Press Start 2P'; font-size: 8px; padding: 5px; cursor: pointer;">OFF</button>
            </div> 
        </div> 
    </div>

    <div id="interaccion-aviso" class="oculto">Presiona [E] para hablar</div>

    <div id="dialogueBox" class="dialogue-container oculto">
        <div id="retrato" class="retrato-contenedor">
            <img id="img-retrato" src="clauicon.png" class="retrato-img">
        </div>
        <div class="character-name" id="charName">Niño:</div>
        <p class="message-text" id="typewriterText"></p>
        <div class="next-arrow"></div>
    </div>

    <canvas id="juego"></canvas>
</div>

<script>
    const canvas = document.getElementById("juego");
    const ctx = canvas.getContext("2d");
    const ajustes = document.getElementById("pantalla-ajustes");
    const menu = document.getElementById("menu-inicio");
    const avisoE = document.getElementById("interaccion-aviso");
    const boxDialogo = document.getElementById("dialogueBox");
    const textoDialogo = document.getElementById("typewriterText");
    const btnVolverJuego = document.getElementById("btn-volver-juego");
    const iconoMision = document.getElementById("icono-mision");
    const numVictoria = document.getElementById("numero-victoria");
    const msgObjetivo = document.getElementById("mensaje-objetivo");
    const pNegra = document.getElementById("pantalla-negra");
    const videoF = document.getElementById("video-final");

    // VARIABLES DE CONTROL
    let contadorVueltas = 0;
    let faseJuego = 1; 
    let imgFondoActual = new Image(); 
    imgFondoActual.src = 'fondo.png'; 

    let eventoActual = ""; 
    const musicaFondo = new Audio('feliz.mp3'); 
    musicaFondo.loop = true;
    musicaFondo.volume = 0.5;

    canvas.width = 1000;
    canvas.height = 550;

    // IMÁGENES
    const imgQuieta = new Image(); imgQuieta.src = 'clauvienderech.png';
    const imgPaso1 = new Image(); imgPaso1.src = 'clauderechm.png';
    const imgPaso2 = new Image(); imgPaso2.src = 'clauderechamov.png';
    const imgNPC = new Image(); imgNPC.src = 'personaje6.png';
    const imgNPC2 = new Image(); imgNPC2.src = 'personaje0.8.png';
    const imgLimonada1 = new Image(); imgLimonada1.src = 'limonada1.png';
    const imgLimonada2 = new Image(); imgLimonada2.src = 'limonada2.png';
    const imgLimonada3 = new Image(); imgLimonada3.src = 'limonada3.png';
    const imgPoste1 = new Image(); imgPoste1.src = 'poste1.png';
    const imgPoste2 = new Image(); imgPoste2.src = 'poste2.png';
    const imgPoste3 = new Image(); imgPoste3.src = 'poste3.png';

    let imgPuestoActual = imgLimonada1;
    let imgPosteActual = imgPoste1;
    let imgPersonajeActual = imgQuieta; 
    let juegoActivo = false;
    let dialogoActivo = false;
    let scrollFondo = 0;
    let indexTexto = 0; 
    let dialogo1Completado = false;
    let dialogo2Completado = false;

    const jugador = { x: 100, y: 200, ancho: 280, alto: 280, vy: 0, gravedad: 0.6 };

    
    function manejarVueltas() {
        // Detecta si hemos avanzado lo suficiente para dar una vuelta
        if (Math.abs(scrollFondo) >= (contadorVueltas + 1) * canvas.width) {
            contadorVueltas++;
            console.log("Vuelta: " + contadorVueltas + " Fase: " + faseJuego);

            if (contadorVueltas >= 5) {
                if (faseJuego === 1) {
                    ejecutarPantallaNegra();
                } else if (faseJuego === 2) {
                    reproducirVideoFinal();
                }
            }
        }
    }

    function ejecutarPantallaNegra() {
    juegoActivo = false;
    pNegra.style.display = "block";
    musicaFondo.pause();
    
    setTimeout(() => {
        pNegra.style.display = "none";
        imgFondoActual.src = 'fondofeo.jpeg'; 
        imgNPC.src = 'narc1.png';
        imgNPC2.src = 'nac2.png';
        contadorVueltas = 0; 
        scrollFondo = 0;
        
        faseJuego = 2; 
        
        juegoActivo = true;
        musicaFondo.play();
        bucle();
    }, 5000);
}

   function reproducirVideoFinal() {
    console.log("Iniciando video final..."); // Para que veas en la consola si llega aquí
    juegoActivo = false;
    musicaFondo.pause();
    
    videoF.style.display = "block";
    videoF.currentTime = 0;
    videoF.volume = 1.0; 

    
    const playPromise = videoF.play();

    if (playPromise !== undefined) {
        playPromise.then(_ => {
            console.log("Video reproduciéndose correctamente");
        }).catch(error => {
            console.log("El navegador bloqueó el video. Intentando reproducir sin sonido...");
            videoF.muted = true; 
            videoF.play();
        });
    }

    videoF.onended = () => {
        alert("Fin de la experiencia");
        location.reload();
    };
}
    // --- LÓGICA DIÁLOGOS ---
    function iniciarDialogo() {
        dialogoActivo = true;
        boxDialogo.classList.remove("oculto");
        avisoE.classList.add("oculto"); 
        iconoMision.classList.add("oculto");
        indexTexto = 0;
        textoDialogo.innerHTML = "";
        
        if (eventoActual === "limonada") {
            document.getElementById("charName").innerText = "Niño:";
            document.getElementById("img-retrato").src = "clauicon.png";
            typeWriter("Hola... mi puesto de limonadas está roto, ¿puede nuestra presidenta ayudarme a repararlo?");
        } else if (eventoActual === "poste") {
            document.getElementById("charName").innerText = "Ciudadano:";
            document.getElementById("img-retrato").src = "clauicon.png";
            typeWriter("¡Claudia! alguien bandalizo el alto y es peligroso, me echas una mano?");
        }
    }

    function typeWriter(texto) {
        if (indexTexto < texto.length) {
            textoDialogo.innerHTML += texto.charAt(indexTexto);
            indexTexto++;
            setTimeout(() => typeWriter(texto), 50);
        }
    }

    boxDialogo.addEventListener('click', () => {
        if (dialogoActivo) {
            boxDialogo.classList.add("oculto");
            dialogoActivo = false;
            if (eventoActual === "limonada") iniciarMiniJuego1();
            else if (eventoActual === "poste") initMiniGame2();
        }
    });

    // --- MINIJUEGO 1 ---
    const capaMini = document.getElementById("capa-minijuego");
    let mini1Activo = false;
    let letraActual = '', teclasLogradas = 0, imagenesLogradas = 0, tiempoMini = 100;

    function iniciarMiniJuego1() {
        capaMini.classList.remove("oculto");
        mini1Activo = true;
        teclasLogradas = 0; imagenesLogradas = 0; tiempoMini = 100;
        nuevaLetra();
        bucleTimerMini();
    }
    function nuevaLetra() {
        letraActual = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random() * 26)];
        document.getElementById("tecla-display").innerText = letraActual;
    }
    function bucleTimerMini() {
        if (!mini1Activo) return;
        tiempoMini -= 0.6;
        document.getElementById("bar-mini").style.width = tiempoMini + "%";
        if (tiempoMini <= 0) location.reload();
        else requestAnimationFrame(bucleTimerMini);
    }

    // --- MINIJUEGO 2 ---
    const canvasUnir = document.getElementById('gameCanvas');
    const ctxUnir = canvasUnir.getContext('2d');
    let dots = [], lines = [], currentLine = null, gameOver = false;

    function initMiniGame2() {
        document.getElementById("capa-unir-letras").classList.remove("oculto");
        dots = []; lines = []; currentLine = null; gameOver = false;
        ['A', 'B', 'C', 'D', 'E'].forEach(char => {
            for(let i=0; i<2; i++) {
                dots.push({ x: Math.random() * 540 + 30, y: Math.random() * 340 + 30, char: char, connected: false });
            }
        });
        drawUnir();
    }

    function drawUnir() {
        ctxUnir.clearRect(0, 0, canvasUnir.width, canvasUnir.height);
        lines.forEach(line => {
            ctxUnir.beginPath(); ctxUnir.strokeStyle = '#3498db'; ctxUnir.lineWidth = 4;
            ctxUnir.moveTo(line.start.x, line.start.y); line.path.forEach(p => ctxUnir.lineTo(p.x, p.y)); ctxUnir.stroke();
        });
        if (currentLine) {
            ctxUnir.beginPath(); ctxUnir.strokeStyle = '#f1c40f'; ctxUnir.lineWidth = 4;
            ctxUnir.moveTo(currentLine.start.x, currentLine.start.y); currentLine.path.forEach(p => ctxUnir.lineTo(p.x, p.y)); ctxUnir.stroke();
        }
        dots.forEach(dot => {
            ctxUnir.fillStyle = dot.connected ? '#bdc3c7' : '#2c3e50';
            ctxUnir.beginPath(); ctxUnir.arc(dot.x, dot.y, 15, 0, Math.PI * 2); ctxUnir.fill();
            ctxUnir.fillStyle = 'white'; ctxUnir.font = 'bold 16px Arial'; ctxUnir.textAlign = 'center';
            ctxUnir.fillText(dot.char, dot.x, dot.y + 6);
        });
        if(gameOver) { alert("¡LO VANDALIZASTE MÁS!"); initMiniGame2(); }
        else if (lines.length === 5) {
            document.getElementById("capa-unir-letras").classList.add("oculto");
            victoriaPoste();
        }
    }

    canvasUnir.addEventListener('mousedown', e => {
        const r = canvasUnir.getBoundingClientRect();
        const mx = e.clientX - r.left, my = e.clientY - r.top;
        dots.forEach(dot => {
            if (!dot.connected && Math.hypot(dot.x - mx, dot.y - my) < 20) {
                currentLine = { start: dot, path: [{x: mx, y: my}] };
            }
        });
    });

    canvasUnir.addEventListener('mousemove', e => {
        if (!currentLine || gameOver) return;
        const r = canvasUnir.getBoundingClientRect();
        const mx = e.clientX - r.left, my = e.clientY - r.top;
        currentLine.path.push({x: mx, y: my});
        drawUnir();
    });

    canvasUnir.addEventListener('mouseup', e => {
        if (!currentLine) return;
        const r = canvasUnir.getBoundingClientRect();
        const mx = e.clientX - r.left, my = e.clientY - r.top;
        dots.forEach(dot => {
            if (!dot.connected && dot !== currentLine.start && dot.char === currentLine.start.char && Math.hypot(dot.x - mx, dot.y - my) < 20) {
                dot.connected = true; currentLine.start.connected = true;
                lines.push(currentLine);
            }
        });
        currentLine = null; drawUnir();
    });

    function victoriaLimonada() {
        document.getElementById("mini-status").innerText = "¡REPARADO!";
        const imgM = document.getElementById("img-mini");
        imgM.classList.remove("oculto");
        imgM.src = "limonada1.png";
        setTimeout(() => {
            imgM.src = "limonada2.png";
            setTimeout(() => {
                imgM.src = "limonada3.png";
                imgPuestoActual = imgLimonada3; 
                dialogo1Completado = true;
                setTimeout(() => {
                    capaMini.classList.add("oculto");
                    mostrarNumeroVictoria("7");
                }, 1000);
            }, 800);
        }, 800);
    }

    function victoriaPoste() {
        capaMini.classList.remove("oculto");
        document.getElementById("mini-status").innerText = "¡LIMPIASTE!";
        const imgM = document.getElementById("img-mini");
        imgM.classList.remove("oculto");
        imgM.src = "poste1.png";
        setTimeout(() => {
            imgM.src = "poste2.png";
            setTimeout(() => {
                imgM.src = "poste3.png";
                imgPosteActual = imgPoste3;
                dialogo2Completado = true;
                setTimeout(() => {
                    capaMini.classList.add("oculto");
                    mostrarNumeroVictoria("3");
                }, 1000);
            }, 800);
        }, 800);
    }

    function mostrarNumeroVictoria(num) {
        numVictoria.innerText = num;
        numVictoria.classList.add("visible");
        setTimeout(() => numVictoria.classList.remove("visible"), 2000);
    }

    const teclasP = {};
    window.addEventListener("keydown", (e) => {
        teclasP[e.code] = true;
        if (e.code === "KeyE" && !avisoE.classList.contains("oculto") && !dialogoActivo) iniciarDialogo();
        if (mini1Activo && e.key.toUpperCase() === letraActual) {
            teclasLogradas++; tiempoMini = 100;
            if (teclasLogradas === 5) {
                imagenesLogradas++; teclasLogradas = 0;
                if (imagenesLogradas === 3) { mini1Activo = false; victoriaLimonada(); }
            }
            document.querySelectorAll(".punto").forEach((p, i) => p.classList.toggle("lleno", i < teclasLogradas));
            nuevaLetra();
        }
    });
    window.addEventListener("keyup", (e) => teclasP[e.code] = false);

    function actualizar() {
        if (!juegoActivo || dialogoActivo || mini1Activo || !document.getElementById("capa-unir-letras").classList.contains("oculto")) return;
        
        if (teclasP["ArrowRight"]) scrollFondo -= 5;
        if (teclasP["ArrowLeft"]) scrollFondo += 5;

        manejarVueltas();

        let mov = teclasP["ArrowRight"] || teclasP["ArrowLeft"];
        imgPersonajeActual = mov ? (Math.floor(Date.now() / 150) % 2 === 0 ? imgPaso1 : imgPaso2) : imgQuieta;

        let xLim = 930 + scrollFondo;
        let xPos = 1800 + scrollFondo;

        if (xLim > 0 && xLim < 400 && !dialogo1Completado) {
            eventoActual = "limonada";
            avisoE.classList.remove("oculto"); iconoMision.classList.remove("oculto");
        } else if (xPos > 0 && xPos < 400 && !dialogo2Completado) {
            eventoActual = "poste";
            avisoE.classList.remove("oculto"); iconoMision.classList.remove("oculto");
        } else {
            avisoE.classList.add("oculto"); iconoMision.classList.add("oculto");
        }

        jugador.vy += jugador.gravedad; jugador.y += jugador.vy;
        if (jugador.y > 200) { jugador.y = 200; jugador.vy = 0; }
    }

    function dibujar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let xr = scrollFondo % canvas.width;
        ctx.drawImage(imgFondoActual, xr, 0, canvas.width, canvas.height);
        ctx.drawImage(imgFondoActual, xr + canvas.width, 0, canvas.width, canvas.height);
        ctx.drawImage(imgFondoActual, xr - canvas.width, 0, canvas.width, canvas.height);

        ctx.drawImage(imgPuestoActual, 1000 + scrollFondo, 180, 250, 200);
        ctx.drawImage(imgNPC, 930 + scrollFondo, 220, 200, 200);
        ctx.drawImage(imgPosteActual, 1800 + scrollFondo, 130, 200, 300);
        ctx.drawImage(imgNPC2, 1750 + scrollFondo, 250, 180, 180);

        ctx.drawImage(imgPersonajeActual, jugador.x, jugador.y, jugador.ancho, jugador.alto);
    }

    function bucle() { 
        if (juegoActivo) { 
            actualizar(); 
            dibujar(); 
            requestAnimationFrame(bucle); 
        } 
    }

    function comenzarJuego() {
        reproducirMusica(); menu.classList.add("oculto"); btnVolverJuego.classList.remove("oculto");
        msgObjetivo.classList.add("visible");
        setTimeout(() => msgObjetivo.classList.remove("visible"), 2000);
        juegoActivo = true; bucle();
    }
    
    function volverAlMenu() { location.reload(); }
    function ajustarVolumen() { musicaFondo.volume = document.getElementById("slider-volumen").value / 100; }
    function ajustarBrillo() { document.getElementById("contenedor-juego").style.filter = `brightness(${document.getElementById("rango-brillo").value}%)`; }
    function abrirAjustes() { reproducirMusica(); menu.classList.add("oculto"); ajustes.classList.remove("oculto"); }
    function cerrarAjustes() { ajustes.classList.add("oculto"); menu.classList.remove("oculto"); }
    function reproducirMusica() { musicaFondo.play().catch(e => {}); }
    function toggleFullscreen() {
        if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); document.getElementById("btnFullscreen").innerText = "ON"; }
        else { document.exitFullscreen(); document.getElementById("btnFullscreen").innerText = "OFF"; }
    }
</script>
</body>
</html>
