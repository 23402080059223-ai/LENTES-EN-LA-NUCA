<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Voz Censurada - Menú de Inicio</title>
    <link rel="stylesheet" href="dialoejem.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Press Start 2P', cursive; 
        }

        #contenedor-juego {
            position: relative; 
            width: 1000px;
            height: 550px;
            border: 2px solid #fff; 
        }

        canvas { 
            display: block; 
            image-rendering: pixelated; 
        }

        #menu-inicio {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.7) 50%, rgba(0,0,0,0.3) 100%), 
                        url('fondo.gif');
            background-size: cover; 
            background-position: center; 
            display: flex;
            flex-direction: column; 
            justify-content: center; 
            align-items: flex-start; 
            padding-left: 50px;
            z-index: 10; 
            box-sizing: border-box;
        }

        h1 { color: white; font-size: 35px; text-shadow: 4px 4px #ff0000; margin-bottom: 40px; }

        .boton-menu {
            background: transparent; color: white; border: 2px solid white;
            padding: 15px; margin: 10px 0; font-size: 14px; 
            font-family: 'Press Start 2P', cursive; cursor: pointer; width: 300px;
            text-align: left; transition: 0.2s;
        }

        .boton-menu:hover { background: white; color: black; transform: translateX(10px); }

        #pantalla-ajustes {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.7) 80%, rgba(0,0,0,0.7) 100%), 
                        url('fondo.gif');
            background-size: cover; 
            background-position: center; 
            display: flex; justify-content: center; align-items: center;
            z-index: 50;
        }

        .ajustes-box {
            width: 500px; height:200px ; background-color: #000; padding: 30px;
            border: 4px solid #fdfdfd; border-radius: 4px;
            box-shadow: inset 0 0 0 4px #4a4a4a; 
            position: relative;
        }

        .ajustes-box h2 { color: #ff0000; font-size: 16px; text-align: center; margin-bottom: 25px; }

        .opcion-ajuste {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; color: white; font-size: 10px;
        }

        .oculto { display: none !important; }

        .boton-volver-fuera {
            position: absolute;
            top: 30px; 
            left: 30px; 
            background: transparent;
            color: white;
            border: 3px solid white;
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            z-index: 60; 
            transform: scaleX(-1); 
            transition: 0.3s;
            line-height: 1;
        }

        .boton-volver-fuera:hover {
            background: white;
            color: black;
            transform: scaleX(-1) scale(1.1);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* --- ESTILOS PARA EL RETRATO --- */
        .retrato-contenedor {
            position: absolute;
            bottom: 160px; /* Ajusta según la altura de tu caja de diálogo */
            left: 50px;
            width: 120px;
            height: 120px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden; /* Corta el resto del cuerpo */
            z-index: 100;
        }

        .retrato-img {
            width: 300px; /* Escalamos la imagen para que la cara se vea grande */
            image-rendering: pixelated;
            margin-top: -30px; /* Movemos la imagen hacia arriba para enfocar la cara */
        }
    </style>
</head>

<body>

<div id="contenedor-juego">

    <button id="btn-volver-juego" class="boton-volver-fuera oculto" onclick="volverAlMenu()">&#10140;</button>

    <div id="menu-inicio">
        <h1>VOZ CENSURADA</h1>
        <button class="boton-menu" onclick="comenzarJuego()">INICIAR PARTIDA</button>
        <button class="boton-menu" onclick="abrirAjustes()">AJUSTES</button>
    </div>

    <div id="pantalla-ajustes" class="oculto">
        <button class="boton-volver-fuera" onclick="cerrarAjustes()">&#10140;</button>

        <div class="ajustes-box">
            <h2>AJUSTES DE SISTEMA</h2>
            <div class="opcion-ajuste">
                <span>VOLUMEN</span>
                <input type="range" min="0" max="100" value="50">
            </div>
            <div class="opcion-ajuste">
                <span>BRILLO</span>
                <input type="range" id="rango-brillo" min="50" max="150" value="100" oninput="ajustarBrillo()">
            </div>
            <div class="opcion-ajuste">
                <span>PANTALLA COMPLETA</span>
                <button id="btnFullscreen" onclick="toggleFullscreen()" style="font-family:'Press Start 2P'; font-size: 8px; padding: 5px; cursor: pointer;">OFF</button>
            </div> 
        </div> 
    </div>

    <div id="interaccion-aviso" class="oculto">Presiona [E] para hablar</div>

    <div id="dialogueBox" class="dialogue-container oculto">
        <div id="retrato" class="retrato-contenedor">
            <img src="claudia.png" class="retrato-img">
        </div>
        <div class="character-name" id="charName">Claudia:</div>
        <p class="message-text" id="typewriterText"></p>
        <div class="next-arrow"></div>
    </div>

    <canvas id="juego"></canvas>
</div>

<script>
    const canvas = document.getElementById("juego");
    const ctx = canvas.getContext("2d");
    const ajustes = document.getElementById("pantalla-ajustes");
    const menu = document.getElementById("menu-inicio");
    const avisoE = document.getElementById("interaccion-aviso");
    const boxDialogo = document.getElementById("dialogueBox");
    const textoDialogo = document.getElementById("typewriterText");
    const btnVolverJuego = document.getElementById("btn-volver-juego");

    canvas.width = 1000;
    canvas.height = 550;

    const imgFondo = new Image(); imgFondo.src = 'fondo.png'; 
    const imgQuieta = new Image(); imgQuieta.src = 'clauvienderech.png';
    const imgPaso1 = new Image(); imgPaso1.src = 'clauderechm.png';
    const imgPaso2 = new Image(); imgPaso2.src = 'clauderechamov.png';
    
    let imgPersonajeActual = imgQuieta; 

    let juegoActivo = false;
    let dialogoActivo = false;
    let dialogoCompletado = false; 
    let scrollFondo = 0;
    let indexTexto = 0; 
    const mensaje = "Eric, amigo mío. Un entrenador de tanto calibre merecía ver esto en primera fila.";

    function typeWriter() {
        if (indexTexto < mensaje.length) {
            textoDialogo.innerHTML += mensaje.charAt(indexTexto);
            indexTexto++;
            setTimeout(typeWriter, 40);
        }
    }

    boxDialogo.addEventListener('click', () => {
        boxDialogo.classList.add("oculto");
        dialogoActivo = false;
        dialogoCompletado = true; 
        textoDialogo.innerHTML = "";
        indexTexto = 0;
    });

    const jugador = {
        x: 100, y: 230,
        ancho: 200, alto: 200,
        saltando: false, vy: 0, gravedad: 0.6
    };

    const teclas = {};
    window.addEventListener("keydown", (e) => {
        teclas[e.code] = true;
        if (e.code === "KeyE" && !avisoE.classList.contains("oculto") && !dialogoActivo && !dialogoCompletado) {
            iniciarDialogo();
        }
    });
    window.addEventListener("keyup", (e) => teclas[e.code] = false);

    function abrirAjustes() {
        menu.classList.add("oculto");
        ajustes.classList.remove("oculto");
    }
    function cerrarAjustes() {
        ajustes.classList.add("oculto");
        menu.classList.remove("oculto");
    }
    
    function ajustarBrillo() {
        const valorBrillo = document.getElementById("rango-brillo").value;
        const contenedor = document.getElementById("contenedor-juego");
        contenedor.style.filter = `brightness(${valorBrillo}%)`;
    }

    function comenzarJuego() {
        menu.classList.add("oculto");
        btnVolverJuego.classList.remove("oculto"); 
        juegoActivo = true;
        bucle();
    }

    function volverAlMenu() {
        juegoActivo = false;
        btnVolverJuego.classList.add("oculto"); 
        menu.classList.remove("oculto"); 
        scrollFondo = 0;
    }

    function iniciarDialogo() {
        dialogoActivo = true;
        boxDialogo.classList.remove("oculto");
        avisoE.classList.add("oculto"); 
        typeWriter();
    }

    function toggleFullscreen() {
        const doc = document.documentElement;
        const btn = document.getElementById("btnFullscreen");
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            btn.innerText = "ON";
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            btn.innerText = "OFF";
        }
    }

    function actualizar() {
        if (!juegoActivo || dialogoActivo) return;
        let estaMoviendose = false;
        if (teclas["ArrowRight"]) { scrollFondo -= 5; estaMoviendose = true; }
        if (teclas["ArrowLeft"]) { scrollFondo += 5; estaMoviendose = true; }

        if (estaMoviendose) {
            if (Math.floor(Date.now() / 150) % 2 === 0) imgPersonajeActual = imgPaso1;
            else imgPersonajeActual = imgPaso2;
        } else {
            imgPersonajeActual = imgQuieta;
        }

        if (scrollFondo < -300 && scrollFondo > -600 && !dialogoCompletado) {
            avisoE.classList.remove("oculto");
        } else {
            avisoE.classList.add("oculto");
        }

        if (teclas["Space"] && !jugador.saltando) {
            jugador.vy = -15;
            jugador.saltando = true;
        }
        jugador.vy += jugador.gravedad;
        jugador.y += jugador.vy;

        if (jugador.y > 230) {
            jugador.y = 230;
            jugador.vy = 0;
            jugador.saltando = false;
        }
    }

    function dibujar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let xRelativa = scrollFondo % canvas.width;
        ctx.drawImage(imgFondo, xRelativa, 0, canvas.width, canvas.height);
        ctx.drawImage(imgFondo, xRelativa + canvas.width, 0, canvas.width, canvas.height);
        ctx.drawImage(imgFondo, xRelativa - canvas.width, 0, canvas.width, canvas.height);
        ctx.drawImage(imgPersonajeActual, jugador.x, jugador.y, jugador.ancho, jugador.alto);
    }

    function bucle() {
        if (!juegoActivo) return; 
        actualizar();
        dibujar();
        requestAnimationFrame(bucle);
    }
</script>
</body>
</html>
